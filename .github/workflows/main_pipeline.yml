name: .NET CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DOTNET_ENABLE_SOLUTION_FILE_EXPERIMENTAL: 1

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore financeiro.slnx

    - name: Build
      run: dotnet build financeiro.slnx --no-restore --configuration Release

    - name: Test
      run: dotnet test financeiro.slnx --configuration Release --no-build
